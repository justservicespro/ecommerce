<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cart — SoundWave (Demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css" />
<link rel="stylesheet" href="../assets/cta.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body data-store="music">

  <nav class="shop-nav">
    <a href="index.html" class="back-link">← Continue browsing</a>
    <span class="brand">SoundWave</span>
    <div class="nav-search">Search artists, albums, playlists...</div>
    <a href="cart.html" class="cart-link">🛒 Cart (<span class="cart-count">0</span>)</a>
  </nav>

  <main class="cart-page">
    <h1>Your Cart</h1>

    <div id="cart-empty">Your cart is empty. <a href="index.html">Browse music →</a></div>
    <div id="cart-items"></div>

    <div class="cart-summary">
      <span>Total</span>
      <span id="cart-total">₦0</span>
    </div>

    <form id="checkout-form" class="checkout-form">
      <label>Full name
        <input type="text" required placeholder="e.g. Bolaji Adeyemi" />
      </label>
      <label>Email (for download links)
        <input type="email" required placeholder="you@example.com" />
      </label>
      <div class="checkout-row">
        <label>Card number
          <input type="text" required placeholder="4242 4242 4242 4242" />
        </label>
        <label>Expiry
          <input type="text" required placeholder="MM/YY" />
        </label>
      </div>
      <button type="submit" id="checkout-btn" class="add-btn" style="margin-top:0.5rem; align-self: flex-start; padding: 0.85rem 2rem;">Buy &amp; Download</button>
    </form>
  </main>

  <div class="modal-overlay" id="order-modal">
    <div class="modal-box">
      <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="11" stroke="#8b5cf6" stroke-width="2"/>
        <path d="M7 12.5L10.5 16L17 8.5" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h2>Purchase complete!</h2>
      <p>Order <span class="order-number"></span></p>
      <p style="font-size:0.85rem;">This is a demo — no payment was processed and no files will be downloaded.</p>
      <button class="modal-close">Back to shop</button>
    </div>
  </div>

  <script src="../assets/cart.js"></script>
  <script src="../assets/cta.js"></script>
</body>
</html>
